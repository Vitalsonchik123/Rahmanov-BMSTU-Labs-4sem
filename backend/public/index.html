<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple App - Акции</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .product-card {
            transition: transform 0.2s;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .filter-input {
            max-width: 300px;
        }

        /* Зелёный цвет (основной) */
        .btn-success,
        .bg-success {
            background-color: #16c645 !important;
            border-color: #16c645 !important;
        }
        .btn-success:hover {
            background-color: #1fa53f !important;
            border-color: #1fa53f !important;
        }

        /* Зелёная обводная кнопка */
        .btn-outline-success {
            color: #16c645 !important;
            border-color: #16c645 !important;
        }
        .btn-outline-success:hover {
            background-color: #16c645 !important;
            border-color: #16c645 !important;
            color: white !important;
        }

        /* Оранжевая кнопка */
        .btn-orange {
            background-color: #fe8c01 !important;
            border-color: #fe8c01 !important;
            color: white !important;
        }
        .btn-orange:hover {
            background-color: #da8c2e !important;
            border-color: #da8c2e !important;
        }

        /* Оранжевый alert */
        .alert-orange {
            background-color: #fe8c01 !important;
            border-color: #da8c2e !important;
            color: white !important;
        }

        /* Зелёный текст для заголовков */
        .text-green {
            color: #16c645 !important;
        }

        /* Зелёная рамка */
        .border-green {
            border-color: #16c645 !important;
        }



        /* Стили для страницы заказов */
        .orders-container {
            max-width: 800px;   /* сделано уже */
            width: 100%;
            margin: 0 auto;
            padding: 20px;
            font-family: Calibri, Helvetica, sans-serif;
        }

        .orders-title {
            font-size: 2rem;
            color: #fe8c01;
            text-align: center;
            margin-bottom: 30px;
            font-weight: bold;
        }

        .orders-controls {
            text-align: right;
            margin-bottom: 20px;
        }

        .orders-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .order-card {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 15px 20px;
            border-left: 4px solid #fe8c01;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .order-number {
            font-size: 0.9rem;
            font-weight: bold;
            color: #fe8c01;
            margin-bottom: 5px;
        }

        .order-name {
            font-size: 1.1rem;
            font-weight: 500;
            color: #000000;
            flex-grow: 1;
            margin-left: 15px;
        }

        .btn-delete-order {
            background-color: #fe8c01;
            border: none;
            color: white;
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: background-color 0.2s;
        }

        .btn-delete-order:hover {
            background-color: #da8c2e;
        }
    </style>
  <script type="module" crossorigin src="/assets/index-BDK03XJK.js"></script>
</head>
<body>
    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
